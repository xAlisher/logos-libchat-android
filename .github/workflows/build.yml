name: build-android-arm64

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "patches/**"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        # standard = the M0 build (12 chat_* exports); mix = the AnonComms
        # superset (12 + chat_get_mix_status). The app vendors the mix superset.
        variant: [standard, mix]
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc || true
          df -h /

      - name: Install NDK r27
        run: |
          echo "y" | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;27.1.12297006"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.1.12297006" >> "$GITHUB_ENV"

      - name: Install rust android target
        run: rustup target add aarch64-linux-android

      - name: Build (standard)
        if: matrix.variant == 'standard'
        run: bash scripts/build-android-arm64.sh
        env:
          BUILD_DIR: ${{ github.workspace }}/logos-chat-build

      - name: Build (mix superset)
        if: matrix.variant == 'mix'
        run: bash scripts/build-android-arm64-mix.sh
        env:
          BUILD_DIR: ${{ github.workspace }}/logos-chat-mix-build

      - name: Upload artifacts (standard)
        if: matrix.variant == 'standard'
        uses: actions/upload-artifact@v4
        with:
          name: logos-libchat-android-arm64-v8a
          path: out/arm64-v8a/
          if-no-files-found: error

      - name: Upload artifacts (mix superset)
        if: matrix.variant == 'mix'
        uses: actions/upload-artifact@v4
        with:
          name: logos-libchat-android-arm64-v8a-mix
          path: out/arm64-v8a-mix/
          if-no-files-found: error
